name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Run flake8 (warnings only, non-blocking)
        run: |
          echo "Running flake8 with warnings..."
          flake8 . --exit-zero
          echo "✅ Flake8 completed with warnings (non-blocking)"

      - name: Run tests (blocking)
        run: pytest
